info:
  name: Get Authenticated User
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:3031/auth/me
  headers:
    - name: Accept
      value: application/json
    - name: X-Requested-With
      value: XMLHttpRequest
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Retorna o usuario autenticado na sessao atual.

  ## Sucesso
  `200 OK`

  ```json
  {
    "data": {
      "id": 1,
      "name": "Jane Doe",
      "email": "jane@example.com"
    }
  }
  ```

  ## Erros comuns
  - `401 Unauthorized`: usuario nao autenticado
